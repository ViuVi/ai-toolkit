<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MediaToolKit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }
    p {
      color: #9ca3af;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(to right, #a855f7, #ec4899);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .btn:active {
      opacity: 0.9;
    }
    .tips {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      text-align: left;
    }
    .tips h3 {
      font-size: 14px;
      color: #a855f7;
      margin-bottom: 12px;
    }
    .tips ul {
      list-style: none;
      color: #9ca3af;
      font-size: 14px;
    }
    .tips li {
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
    }
    .tips li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #a855f7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry, your work is saved!</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    
    <div class="tips">
      <h3>💡 While you wait:</h3>
      <ul>
        <li>Check your WiFi connection</li>
        <li>Try switching to mobile data</li>
        <li>Move closer to your router</li>
        <li>Your drafts will sync when back online</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
